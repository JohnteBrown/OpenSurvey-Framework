codecov:
 token: 9fd4cd33-1efd-4611-917e-5397e1275582

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: 75%
        threshold: 2%
        if_ci_failed: error

    patch:
      default:
        target: 70%
        threshold: 5%
        if_ci_failed: error

    changes: no

ignore:
  - "node_modules"
  - "_site"
  - "assets"
  - "docs"
  - "qunit"
  - "test/bootstrap.test.js"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false